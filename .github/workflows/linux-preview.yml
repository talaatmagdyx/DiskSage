name: Build Linux Preview

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing prerelease tag to receive the Linux packages
        required: true
        default: preview-0.1.0

permissions:
  contents: write

jobs:
  build:
    name: Linux ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out release source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Install Linux packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libayatana-appindicator3-dev \
            libfuse2 \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: linux-preview-${{ matrix.target }}

      - run: npm ci

      - name: Build AppImage, Debian, and RPM packages
        run: npm run tauri -- build --target ${{ matrix.target }} --bundles appimage,deb,rpm

      - name: Collect packages
        run: |
          mkdir artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/appimage/* artifacts/
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/* artifacts/
          cp src-tauri/target/${{ matrix.target }}/release/bundle/rpm/* artifacts/

      - name: Upload packages for publication
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: artifacts/*
          if-no-files-found: error

  publish:
    name: Publish Linux packages
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download packages
        uses: actions/download-artifact@v5
        with:
          pattern: linux-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS-linux.txt

      - name: Upload packages to prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: gh release upload "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
